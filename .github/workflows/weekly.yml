name: Weekly Price & Benchmark Update

on:
  schedule:
    # Every Monday at 7:00 AM IST (1:30 AM UTC)
    - cron: "30 1 * * 1"
  workflow_dispatch:   # allows manual trigger from GitHub Actions tab

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests yfinance python-dateutil

      - name: Run price updater
        run: python update_prices.py

      - name: Commit & push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html security_map.json
          git diff --cached --quiet || git commit -m "chore: weekly price & benchmark update $(date +'%d %b %Y')"
          git push
